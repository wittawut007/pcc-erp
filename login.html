<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCC POSTENTION - Log in</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', 'IBM Plex Sans Thai', sans-serif; }
        
        .custom-checkbox {
            appearance: none;
            background-color: #f8fafc;
            margin: 0;
            font: inherit;
            color: currentColor;
            width: 1.25em;
            height: 1.25em;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            display: grid;
            place-content: center;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }

        .custom-checkbox::before {
            content: "";
            width: 0.7em;
            height: 0.7em;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em white;
            background-color: white;
            transform-origin: center;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }

        .custom-checkbox:checked {
            background-color: #1D63D3;
            border-color: #1D63D3;
        }

        .custom-checkbox:checked::before {
            transform: scale(1);
        }

        .flat-input:focus {
            background-color: #f1f5f9;
            border-color: #1D63D3;
        }
    </style>
</head>
<body class="min-h-screen bg-white flex flex-col lg:flex-row">

    <!-- Left Column: Branding (Main Page Style) -->
    <div class="hidden lg:flex lg:w-1/2 items-center justify-center bg-white border-r border-gray-100">
        <div class="text-center">
            <!-- Main Style Logo -->
            <div class="flex items-center justify-center gap-4 mb-4">
                <div class="w-20 h-20 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <i class="fas fa-industry text-white text-4xl"></i>
                </div>
            </div>
            <h1 class="font-bold text-5xl text-slate-900 tracking-tight uppercase">PCC <span class="text-blue-600">POSTENTION</span></h1>
            <p class="text-slate-400 font-medium tracking-[0.3em] mt-3 uppercase text-sm">ERP Production System</p>
        </div>
    </div>

    <!-- Right Column: Login Form -->
    <div class="w-full lg:w-1/2 flex items-center justify-center p-8 sm:p-12">
        <div class="w-full max-w-[420px]">
            
            <!-- Form Header - Centered Logo and Text -->
            <div class="mb-12 text-center">
                <div class="flex items-center justify-center mb-6">
                    <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center">
                        <i class="fas fa-industry text-white text-xl"></i>
                    </div>
                </div>
                
                <h2 class="text-3xl font-bold text-gray-900 mb-2 tracking-tight">เข้าสู่ระบบ</h2>
                <p class="text-gray-500 text-sm">ยินดีต้อนรับกลับ! โปรดกรอกข้อมูลเพื่อเข้าใช้งานระบบ</p>
            </div>

            <!-- Login Form -->
            <form class="space-y-6">
                <!-- User Input -->
                <div>
                    <label for="username" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">ชื่อผู้ใช้งาน (Username)</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <i class="fas fa-user text-xs"></i>
                        </span>
                        <input 
                            type="text" 
                            id="username" 
                            placeholder="Enter your username" 
                            class="flat-input w-full pl-11 pr-4 py-3.5 rounded-lg border border-gray-200 bg-white outline-none transition-all text-gray-800 placeholder:text-slate-300 font-medium"
                        >
                    </div>
                </div>

                <!-- Password Input -->
                <div>
                    <label for="password" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">รหัสผ่าน (Password)</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <i class="fas fa-lock text-xs"></i>
                        </span>
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="••••••••" 
                            class="flat-input w-full pl-11 pr-4 py-3.5 rounded-lg border border-gray-200 bg-white outline-none transition-all text-gray-800 placeholder:text-slate-300 font-medium"
                        >
                    </div>
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="flex items-center justify-between pt-1">
                    <div class="flex items-center">
                        <input id="remember" type="checkbox" class="custom-checkbox">
                        <label for="remember" class="ml-2.5 block text-xs font-bold text-slate-500 cursor-pointer select-none uppercase tracking-wide">
                            จดจำฉันไว้
                        </label>
                    </div>
                    <div class="text-xs">
                        <a href="#" class="font-bold text-[#1D63D3] hover:underline">ลืมรหัสผ่าน?</a>
                    </div>
                </div>

                <!-- Sign In Button -->
                <button 
                    type="button" 
                    onclick="window.location.href='index.html'" 
                    class="w-full flex justify-center items-center py-4 px-4 rounded-lg text-sm font-bold text-white bg-[#1D63D3] hover:bg-blue-700 transition-all transition h-12 shadow-none"
                >
                    เข้าสู่ระบบ (Sign in)
                </button>

            </form>

            <!-- Bottom Contact Link -->
            <div class="mt-12 text-center">
                <p class="text-xs text-slate-400">
                    หากพบปัญหาการเข้าใช้งาน หรือลืมรหัสผ่าน?
                    <br>
                    <a href="#" class="font-bold text-[#1D63D3] hover:underline mt-1 inline-block">
                        ติดต่อฝ่าย IT (Digital Hub)
                    </a>
                </p>
            </div>
        </div>
    </div>

</body>
</html>
