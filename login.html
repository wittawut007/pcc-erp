<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCC POSTENTION - Log in</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', 'IBM Plex Sans Thai', sans-serif; }
        
        /* Custom Checkbox */
        .custom-checkbox {
            appearance: none;
            background-color: #fff;
            margin: 0;
            font: inherit;
            color: currentColor;
            width: 1.15em;
            height: 1.15em;
            border: 1px solid #d1d5db;
            border-radius: 0.25em;
            display: grid;
            place-content: center;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }

        .custom-checkbox::before {
            content: "";
            width: 0.65em;
            height: 0.65em;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em white;
            background-color: white;
            transform-origin: center;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }

        .custom-checkbox:checked {
            background-color: #2563eb;
            border-color: #2563eb;
        }

        .custom-checkbox:checked::before {
            transform: scale(1);
        }
    </style>
</head>
<body class="min-h-screen bg-white flex">

    <!-- Left Column: Branding / Illustration (Hidden on smaller screens) -->
    <div class="hidden lg:flex lg:w-1/2 items-center justify-center flex-col relative overflow-hidden bg-slate-50/50 border-r border-slate-100">
        <!-- Optional faint background pattern -->
        <div class="absolute inset-0 opacity-20 pointer-events-none" style="background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 30px 30px;"></div>
        
        <div class="relative z-10 flex flex-col items-center">
            <!-- Large Logo Graphic -->
            <div class="relative w-48 h-48 mb-8 flex items-center justify-center">
                <!-- Hexagon Base -->
                <svg viewBox="0 0 100 100" class="w-full h-full text-blue-600 drop-shadow-xl" fill="currentColor">
                    <polygon points="50 3, 93 25, 93 75, 50 97, 7 75, 7 25" />
                </svg>
                <!-- Inner Icon -->
                <i class="fas fa-industry text-white text-6xl absolute z-10"></i>
                <!-- Accents -->
                <div class="absolute -top-4 -right-4 w-16 h-16 bg-emerald-400 rounded-full mix-blend-multiply filter blur-xl opacity-70"></div>
                <div class="absolute -bottom-4 -left-4 w-16 h-16 bg-blue-300 rounded-full mix-blend-multiply filter blur-xl opacity-70"></div>
            </div>

            <!-- Brand Name Adjusted to match main page -->
            <h1 class="font-bold text-4xl text-blue-900 tracking-tight uppercase">PCC <span class="text-blue-500">POSTENTION</span></h1>
            <p class="text-slate-500 font-medium tracking-widest mt-2 uppercase text-sm">ERP Production System</p>
        </div>
    </div>

    <!-- Right Column: Login Form -->
    <div class="w-full lg:w-1/2 flex items-center justify-center p-8 sm:p-12 relative">
        
        <div class="w-full max-w-[400px]">
            
            <!-- Mobile Logo (Visible only on small screens) -->
            <div class="lg:hidden flex items-center justify-center mb-10">
                <div class="bg-blue-600 p-3 rounded-xl shadow-lg mr-3">
                    <i class="fas fa-industry text-white text-2xl"></i>
                </div>
                <h1 class="font-bold text-3xl text-blue-900 tracking-tight">PCC <span class="text-blue-600">POSTENTION</span></h1>
            </div>

            <!-- Header Texts -->
            <div class="mb-10 text-center">
                <div class="flex w-16 h-16 bg-gradient-to-br from-blue-600 to-blue-800 rounded-2xl shadow-xl shadow-blue-200 items-center justify-center mb-8 mx-auto transform hover:rotate-3 transition-transform duration-300">
                    <i class="fas fa-industry text-white text-3xl"></i>
                </div>
                <h2 class="text-4xl font-extrabold text-slate-900 mb-2 tracking-tight">เข้าสู่ระบบ</h2>
                <p class="text-slate-400 text-sm font-medium">ยินดีต้อนรับกลับ! โปรดกรอกข้อมูลเพื่อเข้าใช้งานระบบ</p>
            </div>

            <!-- Login Form Card-like styling -->
            <div class="bg-white/70 backdrop-blur-md p-8 rounded-3xl border border-slate-100 shadow-2xl shadow-blue-500/5">
                <form class="space-y-6">
                    
                    <!-- Email / Username Input -->
                    <div>
                        <label for="username" class="block text-sm font-bold text-slate-700 mb-2.5">ชื่อผู้ใช้งาน (Username)</label>
                        <div class="relative group">
                            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400 group-focus-within:text-blue-500 transition-colors">
                                <i class="fas fa-user text-sm"></i>
                            </span>
                            <input 
                                type="text" 
                                id="username" 
                                placeholder="Enter your username" 
                                class="w-full pl-11 pr-4 py-3.5 rounded-2xl border border-slate-200 focus:ring-4 focus:ring-blue-500/10 focus:border-blue-600 outline-none transition-all text-slate-800 bg-white/50 hover:bg-white"
                            >
                        </div>
                    </div>

                    <!-- Password Input -->
                    <div>
                        <label for="password" class="block text-sm font-bold text-slate-700 mb-2.5">รหัสผ่าน (Password)</label>
                        <div class="relative group">
                            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400 group-focus-within:text-blue-500 transition-colors">
                                <i class="fas fa-lock text-sm"></i>
                            </span>
                            <input 
                                type="password" 
                                id="password" 
                                placeholder="••••••••" 
                                class="w-full pl-11 pr-4 py-3.5 rounded-2xl border border-slate-200 focus:ring-4 focus:ring-blue-500/10 focus:border-blue-600 outline-none transition-all text-slate-800 bg-white/50 hover:bg-white"
                            >
                            <button type="button" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-blue-600 transition">
                                <i class="far fa-eye text-sm"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Remember Me & Forgot Password Row -->
                    <div class="flex items-center justify-between pt-1">
                        <div class="flex items-center">
                            <input id="remember" type="checkbox" class="custom-checkbox">
                            <label for="remember" class="ml-2.5 block text-sm font-medium text-slate-600 cursor-pointer select-none">
                                จดจำฉันไว้ในระบบ
                            </label>
                        </div>
                        <div class="text-sm">
                            <a href="#" class="font-bold text-blue-600 hover:text-blue-500 transition underline-offset-4 hover:underline">
                                ลืมรหัสผ่าน?
                            </a>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button 
                        type="button" 
                        onclick="window.location.href='index.html'" 
                        class="w-full flex justify-center items-center py-4 px-4 border border-transparent rounded-2xl shadow-xl shadow-blue-600/30 text-base font-bold text-white bg-gradient-to-r from-blue-600 to-blue-700 hover:shadow-blue-600/40 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all transform active:scale-[0.98] mt-4"
                    >
                        เข้าสู่ระบบ (Sign in)
                        <i class="fas fa-arrow-right ml-2 text-sm opacity-50"></i>
                    </button>

                </form>
            </div>

            <!-- Bottom Link (Alternative to Sign Up) -->
            <div class="mt-10 pt-8 border-t border-slate-100">
                <p class="text-center text-sm text-slate-500">
                    หากพบปัญหาการเข้าใช้งาน หรือลืมรหัสผ่าน? 
                    <br class="sm:hidden">
                    <a href="#" class="font-bold text-blue-600 hover:text-blue-500 transition hover:underline">
                        ติดต่อฝ่าย IT (Digital Hub)
                    </a>
                </p>
            </div>

        </div>
    </div>

</body>
</html>
